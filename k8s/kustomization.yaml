apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# OneThingTsukuba の ghcr パッケージは repo と同じ public 設定のため imagePullSecret 不要。
# codex 認証だけ SealedSecret で持ち込む(refresh は PVC 側で書き戻す)。
resources:
- pvc.yaml
- sealedsecret-codex-auth.yaml
- deployment.yaml
- service.yaml
images:
- name: ghcr.io/onethingtsukuba/startix-issue-box
  newName: ghcr.io/onethingtsukuba/startix-issue-box
  newTag: 9a1c45758bca
