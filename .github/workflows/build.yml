name: build
on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/kustomization.yaml'
      - 'README.md'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute short sha
        id: vars
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/onethingtsukuba/startix-issue-box:${{ steps.vars.outputs.sha }}

      - name: Update kustomization image tag
        run: |
          cd k8s
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar xz
          ./kustomize edit set image ghcr.io/onethingtsukuba/startix-issue-box=ghcr.io/onethingtsukuba/startix-issue-box:${{ steps.vars.outputs.sha }}
          rm -f kustomize

      - name: Commit image tag back
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "ci: deploy startix-issue-box ${{ steps.vars.outputs.sha }} [skip ci]" || { echo "no change"; exit 0; }
          git push
